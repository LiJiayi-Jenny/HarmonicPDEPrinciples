name = "harmonic_pde_principles"
version = "0.1.0"
keywords = ["math", "harmonic-functions", "maximum-principle"]
defaultTargets = ["HarmonicPDEPrinciples"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "batteries"
path = "../.lake/packages/batteries"

[[require]]
name = "Cli"
path = "../.lake/packages/Cli"

[[require]]
name = "Qq"
path = "../.lake/packages/Qq"

[[require]]
name = "aesop"
path = "../.lake/packages/aesop"

[[require]]
name = "proofwidgets"
path = "../.lake/packages/proofwidgets"

[[require]]
name = "plausible"
path = "../.lake/packages/plausible"

[[require]]
name = "LeanSearchClient"
path = "../.lake/packages/LeanSearchClient"

[[require]]
name = "importGraph"
path = "../.lake/packages/importGraph"

[[require]]
name = "mathlib"
path = "../.lake/packages/mathlib"

[[lean_lib]]
name = "HarmonicPDEPrinciples"
roots = [
  "LocalMaximumBall",
  "ComplexBallMeanValue",
  "BoundaryMaximum",
  "HarmonicComparisonPrinciple",
  "PoissonDirichletUniqueness"
]
